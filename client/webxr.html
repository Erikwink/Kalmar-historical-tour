<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kalmar WebXR</title>
    <style>
      :root {
        color-scheme: dark;
        --bg-top: #15203d;
        --bg-bottom: #04050b;
        --panel: rgba(255, 255, 255, 0.08);
        --panel-border: rgba(255, 255, 255, 0.16);
        --text: #f5f6fa;
        --muted: rgba(245, 246, 250, 0.74);
        --vr: #e5f14f;
        --ar: #8ee7c4;
        --sim: #6cb3ff;
        --dark-btn: #2c3243;
        --light-btn: #f2f3f8;
        --warm-btn: #ffe59b;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        color: var(--text);
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top, var(--bg-top), var(--bg-bottom) 65%);
      }

      main {
        width: min(92vw, 620px);
        padding: 24px;
        border-radius: 18px;
        background: var(--panel);
        border: 1px solid var(--panel-border);
        backdrop-filter: blur(6px);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 1.5rem;
      }

      p {
        margin: 0;
        color: var(--muted);
      }

      .stack {
        display: grid;
        gap: 12px;
        margin-top: 18px;
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .field-grid {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
        align-items: end;
      }

      .field-grid label {
        grid-column: 1 / -1;
        font-size: 0.9rem;
        color: var(--muted);
      }

      input,
      select,
      button {
        border: 0;
        border-radius: 10px;
        padding: 11px 14px;
        font: inherit;
      }

      input,
      select {
        background: rgba(10, 12, 18, 0.35);
        color: var(--text);
        border: 1px solid rgba(255, 255, 255, 0.2);
      }

      button {
        font-weight: 600;
        cursor: pointer;
      }

      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      #start-vr {
        background: var(--vr);
        color: #1d2027;
      }

      #start-ar {
        background: var(--ar);
        color: #10231b;
      }

      #start-sim {
        background: var(--sim);
        color: #08223d;
      }

      #end-xr {
        background: var(--dark-btn);
        color: var(--text);
      }

      #connect-session {
        background: var(--light-btn);
        color: #161823;
      }

      /* #send-mock-scene {
        background: var(--warm-btn);
        color: #332400;
      } */

      .status {
        padding: 14px 16px;
        border-radius: 12px;
        background: rgba(10, 12, 18, 0.28);
        border: 1px solid rgba(255, 255, 255, 0.12);
      }

      #status {
        font-size: 0.98rem;
      }

      #scene-indicator {
        margin-top: 8px;
        font-size: 0.92rem;
        color: var(--muted);
      }

      #xr-canvas {
        width: 100%;
        height: 240px;
        border-radius: 14px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        display: block;
        background: rgba(0, 0, 0, 0.2);
      }

      .footer-link {
        display: inline-block;
        margin-top: 14px;
        color: var(--muted);
        text-decoration: none;
      }

      .footer-link:hover {
        color: var(--text);
      }

      @media (max-width: 640px) {
        main {
          padding: 18px;
        }

        .field-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Kalmar WebXR Sandbox</h1>
      <p>Use this page to test the isolated Babylon WebXR client without touching the main React headset app.</p>
      <p>Open with <code>/webxr.html?session=123456</code> to auto-connect a session.</p>

      <div class="stack">
        <div class="controls">
          <button id="start-vr">Start VR</button>
          <button id="start-ar">Start AR</button>
          <button id="start-sim">Start Simulation</button>
          <button id="end-xr" disabled>End Session</button>
        </div>

        <div class="field-grid">
          <label for="session-id">Session ID</label>
          <input id="session-id" name="session-id" type="text" value="" maxlength="32" placeholder="Skriv sessionskod" />
          <button id="connect-session">Connect Scene Stream</button>
        </div>

        <div class="status">
          <div id="status">Checking WebXR support...</div>
          <div id="scene-indicator">Active scene: waiting</div>
        </div>

        <canvas id="xr-canvas" aria-label="WebXR preview canvas"></canvas>
      </div>

      <a class="footer-link" href="/">Back to main client</a>
    </main>

    <script type="module" src="/src/webxr/main.js"></script>
  </body>
</html>
