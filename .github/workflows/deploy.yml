name: Deploy to Firebase Hosting

on:
  release:
    types: [published]

jobs:
  deploy-controller:
    name: Deploy Controller
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/controller-') || startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: controller/package-lock.json

      - name: Install saas-adapter dependencies
        working-directory: saas-adapter
        run: npm ci

      - name: Build controller
        working-directory: controller
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_EMAIL: ${{ secrets.VITE_FIREBASE_EMAIL }}
          VITE_FIREBASE_PASSWORD: ${{ secrets.VITE_FIREBASE_PASSWORD }}
        run: npm ci && npm run build

      - name: Deploy controller to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: kalmar-historical-tour
          channelId: live
          targets: controller

  deploy-client:
    name: Deploy Client
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/client-') || startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install saas-adapter dependencies
        working-directory: saas-adapter
        run: npm ci

      - name: Build client
        working-directory: client
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
        run: npm ci && npm run build

      - name: Deploy client to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: kalmar-historical-tour
          channelId: live
          targets: client